title: Credential Dumping Tool Execution
id: c3d4e5f6-3456-789a-bcde-f01234567890
status: experimental
description: |
  Detects execution of known credential dumping tools or suspicious
  access patterns to LSASS. Validated in home lab with memory dump analysis.
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: Takahiro Oda
date: 2026/03/15
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_tools:
    - Image|endswith:
        - '\mimikatz.exe'
        - '\procdump.exe'
        - '\nanodump.exe'
    - CommandLine|contains:
        - 'sekurlsa::logonpasswords'
        - 'lsass.dmp'
        - 'comsvcs.dll,MiniDump'
        - 'lsass.exe full'
  condition: selection_tools
falsepositives:
  - Legitimate debugging by admins
  - Security tool testing
level: critical
